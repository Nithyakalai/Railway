<!DOCTYPE html>
<html>
<head>
<title>RailOps - Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.brand {
    text-align: center;
    margin-bottom: 32px;
    color: white;
}
.brand .icon { font-size: 3rem; margin-bottom: 8px; }
.brand h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; }
.brand p { font-size: 0.95rem; opacity: 0.7; margin-top: 4px; }
.box {
    background: white;
    padding: 40px;
    border-radius: 16px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.box h2 {
    font-size: 1.3rem;
    color: #0f172a;
    margin-bottom: 24px;
    text-align: center;
}
.field { margin-bottom: 16px; }
.field label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 6px;
}
.field input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.95rem;
    transition: border-color 0.2s;
}
.field input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
}
button:hover {
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(37,99,235,0.4);
}
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.9rem;
    color: #64748b;
}
.footer a { color: #2563eb; font-weight: 600; }
.error {
    background: #fef2f2;
    color: #dc2626;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    text-align: center;
}
</style>
</head>
<body>

<div class="brand">
    <div class="icon">🚆</div>
    <h1>RailOps</h1>
    <p>Railway Operational Management System</p>
</div>

<div class="box">
    <h2>Welcome Back</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="field">
            <label>Username</label>
            <input name="username" placeholder="Enter your username" required>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit">Sign In</button>
    </form>

    <div class="footer">
        Don't have an account? <a href="/signup">Create one</a>
    </div>
</div>

</body>
</html>
